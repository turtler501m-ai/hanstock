<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanStock AI 해외선물 신호검증</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/ai_dashboard.css?v=2">
    <link rel="stylesheet" href="/static/css/futures_signals.css?v=2">
    <style>
        .tab-nav {
            display: flex;
            gap: 2px;
            padding: 4px 8px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }
        .tab-nav button {
            padding: 4px 10px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .tab-nav button:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #cbd5e1;
        }
        .tab-nav button.active {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
            font-weight: 600;
        }
        .tab-content {
            display: none;
            padding: 20px;
            min-height: calc(100vh - 200px);
            box-sizing: border-box;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-shell futures-shell">
        <aside class="side-nav" aria-label="해외선물 신호검증 메뉴">
            <div class="brand-block">
                <div class="brand-mark">FS</div>
                <div>
                    <strong>Futures Signals</strong>
                    <span>Telegram Verification</span>
                </div>
            </div>
            <nav>
                <a href="/" data-icon="layout-dashboard">기존 대시보드</a>
                <a href="#summary" data-icon="chart-candlestick">신호검증</a>
            </nav>
            <div class="mode-panel">
                <span>운영 범위</span>
                <strong>검증 전용</strong>
                <small>실계좌 주문과 분리된 성과 분석 화면</small>
            </div>
        </aside>

        <main class="workspace futures-workspace">
            <header class="topbar" id="summary">
                <div>
                    <p class="eyebrow">Telegram signals / Backtest</p>
                    <h1>해외선물 매매신호 수집, 파싱, 검증 결과</h1>
                </div>
                <div class="topbar-actions">
                    <a class="ghost-link" href="/" data-icon="arrow-left">기존 대시보드</a>
                    <button type="button" class="icon-button" id="btn-refresh-futures" aria-label="새로고침" title="새로고침" data-icon="refresh-cw"></button>
                </div>
            </header>

            <nav class="tab-nav" role="tablist">
                <button type="button" class="active" data-tab="overview" data-fragment="futures_tab_overview.html" role="tab" aria-selected="true">개요</button>
                <button type="button" data-tab="signals" data-fragment="futures_tab_signals.html" role="tab" aria-selected="false">신호 목록</button>
                <button type="button" data-tab="mock-perf" data-fragment="futures_tab_mock_performance.html" role="tab" aria-selected="false">모의성과</button>
                <button type="button" data-tab="live-perf" data-fragment="futures_tab_live_performance.html" role="tab" aria-selected="false">실계좌성과</button>
                <button type="button" data-tab="settings" data-fragment="futures_tab_settings.html" role="tab" aria-selected="false">설정</button>
            </nav>

            <div id="tab-overview" class="tab-content active" role="tabpanel">
                <!-- Loaded dynamically -->
            </div>
            <div id="tab-signals" class="tab-content" role="tabpanel"></div>
            <div id="tab-mock-perf" class="tab-content" role="tabpanel"></div>
            <div id="tab-live-perf" class="tab-content" role="tabpanel"></div>
            <div id="tab-settings" class="tab-content" role="tabpanel"></div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
    const tabFragments = {};
    let overviewLoaded = false;

    async function loadTabFragment(tabName, fragmentUrl) {
        // Always inject HTML (even if cached) so onclick handlers bind to fresh DOM nodes
        const cached = tabFragments[tabName];
        if (cached) {
            document.getElementById('tab-' + tabName).innerHTML = cached;
            iconize();
            return;
        }
        return fetch('/templates/fragments/' + fragmentUrl)
            .then(r => r.text())
            .then(html => {
                document.getElementById('tab-' + tabName).innerHTML = html;
                tabFragments[tabName] = html;
                iconize();
            });
    }

    function runTabInit(tabName) {
        if (tabName === 'overview') {
            if (typeof loadOverviewData === 'function') loadOverviewData();
        } else if (tabName === 'signals') {
            if (typeof renderSignals === 'function') renderSignals();
            if (typeof renderDetails === 'function') {
                renderDetails(state.signals.find(function(item) { return item.id === state.selectedId; }) || state.signals[0] || null);
            }
        } else if (tabName === 'mock-perf') {
            if (typeof loadMockPerformance === 'function') loadMockPerformance();
            if (typeof loadPaperPerformance === 'function') loadPaperPerformance();
        } else if (tabName === 'live-perf') {
            if (typeof loadExecutorState === 'function') loadExecutorState();
            if (typeof loadLivePerformance === 'function') loadLivePerformance();
        } else if (tabName === 'settings') {
            if (typeof loadExecutorState === 'function') loadExecutorState();
        }
    }

    async function init() {
        await loadTabFragment('overview', 'futures_tab_overview.html');
        overviewLoaded = true;
        if (typeof refreshDashboard === 'function') {
            refreshDashboard();
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const tabButtons = document.querySelectorAll('.tab-nav button');

        init();

        tabButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                const fragmentUrl = this.dataset.fragment;

                tabButtons.forEach(function(b) {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');

                document.querySelectorAll('.tab-content').forEach(function(content) {
                    content.classList.remove('active');
                });
                document.getElementById('tab-' + tabName).classList.add('active');

                loadTabFragment(tabName, fragmentUrl).then(function() {
                    runTabInit(tabName);
                });
            });
        });
    });
    </script>
    <style>
        .btn-buy { background: #22c55e !important; }
        .btn-sell { background: #ef4444 !important; }
        .btn-buy:hover { background: #16a34a !important; }
        .btn-sell:hover { background: #dc2626 !important; }
        .btn-cancel { padding: 4px 8px; background: #64748b; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-cancel:hover { background: #475569; }
        .text-buy { color: #22c55e !important; }
        .text-sell { color: #ef4444 !important; }
    </style>
    <script src="/static/js/futures_signals.js?v=26"></script>
</body>
</html>
