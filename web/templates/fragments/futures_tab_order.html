<section class="futures-grid">
    <article class="panel">
        <div class="panel-title">
            <h2>주문하기</h2>
            <p>해외선물optsms 매수/매도 주문</p>
        </div>
        <div class="order-form" style="padding: 16px;">
            <div style="display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 150px;">
                    <label style="display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px;">종목코드</label>
                    <input type="text" id="order-symbol" placeholder="예: NQ, ES, GC" 
                           style="width: 100%; padding: 8px; background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.2); color: #fff; border-radius: 4px;">
                </div>
                <div style="flex: 1; min-width: 100px;">
                    <label style="display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px;">수량</label>
                    <input type="number" id="order-qty" value="1" min="1"
                           style="width: 100%; padding: 8px; background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.2); color: #fff; border-radius: 4px;">
                </div>
                <div style="flex: 1; min-width: 100px;">
                    <label style="display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px;">가격</label>
                    <input type="text" id="order-price" value="시장가" 
                           style="width: 100%; padding: 8px; background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.2); color: #fff; border-radius: 4px;">
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="button" id="btn-buy" class="btn-buy" 
                        style="flex: 1; padding: 10px; background: #22c55e; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-weight: 600;">매수</button>
                <button type="button" id="btn-sell" class="btn-sell" 
                        style="flex: 1; padding: 10px; background: #ef4444; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-weight: 600;">매도</button>
            </div>
            <div id="order-result" style="margin-top: 12px; font-size: 0.85rem;"></div>
        </div>
    </article>

    <article class="panel">
        <div class="panel-title">
            <h2>주문가능금액</h2>
            <p>현재 주문 가능한 금액</p>
        </div>
        <div class="orderable-info" style="padding: 16px;">
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                <div><span style="color: #94a3b8; font-size: 0.8rem;">예수금</span><strong id="order-cash" style="display: block; font-size: 1.1rem;">-</strong></div>
                <div><span style="color: #94a3b8; font-size: 0.8rem;">주문가능</span><strong id="order-available" style="display: block; font-size: 1.1rem;">-</strong></div>
            </div>
        </div>
    </article>

    <article class="panel" style="grid-column: 1 / -1;">
        <div class="panel-title">
            <h2>미체결주문</h2>
        </div>
        <div class="table-responsive">
            <table class="signal-table">
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>종목</th>
                        <th>구분</th>
                        <th>수량</th>
                        <th>가격</th>
                        <th>상태</th>
                        <th>취소</th>
                    </tr>
                </thead>
                <tbody id="pending-orders-body">
                </tbody>
            </table>
        </div>
        <div class="empty-state" id="pending-empty">미체결 주문이 없습니다.</div>
    </article>

    <article class="panel" style="grid-column: 1 / -1;">
        <div class="panel-title">
            <h2>주문내역</h2>
        </div>
        <div class="table-responsive">
            <table class="signal-table">
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>종목</th>
                        <th>구분</th>
                        <th>수량</th>
                        <th>가격</th>
                        <th>체결수량</th>
                    </tr>
                </thead>
                <tbody id="order-history-body">
                </tbody>
            </table>
        </div>
        <div class="empty-state" id="orders-empty">주문내역이 없습니다.</div>
    </article>
</section>
