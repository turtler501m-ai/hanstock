<div class="perf-grid">
  <!-- Mock Simulator 성과 -->
  <div class="perf-card">
    <h3>Mock 시뮬레이터</h3>
    <div id="mock-stats">
      <div class="stat-row"><span>총 거래</span><span id="mock-total">-</span></div>
      <div class="stat-row"><span>오픈 포지션</span><span id="mock-open">-</span></div>
      <div class="stat-row"><span>총 손익</span><span id="mock-pnl-stat">-</span></div>
      <div class="stat-row"><span>승률</span><span id="mock-win-rate-stat">-</span></div>
    </div>
    <div id="mock-positions-list" class="positions-list"></div>
  </div>

  <!-- KIS 모의계좌 성과 -->
  <div class="perf-card">
    <h3>KIS 모의계좌</h3>
    <div id="paper-stats">
      <div class="stat-row"><span>잔고</span><span id="paper-balance">-</span></div>
      <div class="stat-row"><span>오픈 포지션</span><span id="paper-positions-count">-</span></div>
      <div class="stat-row"><span>가용 현금</span><span id="paper-cash">-</span></div>
    </div>
    <div id="paper-positions-list" class="positions-list"></div>
    <div id="paper-executions" class="executions-list"></div>
  </div>
</div>
